services:
  app:
    build: .
    depends_on:
      - chromadb
      - ollama
    volumes:
      - ./docs:/app/docs
    env_file:
      - .env
    stdin_open: true
    tty: true

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/.chroma/index
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_NUM_PARALLEL=1       # une seule requête à la fois
      - OLLAMA_MAX_QUEUE=2          # file d'attente limitée
      - OLLAMA_FLASH_ATTENTION=1    # réduit l'utilisation VRAM
      - OLLAMA_GPU_OVERHEAD=512     # réserve 512MB VRAM pour le système
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  chroma_data:
  ollama_data:
